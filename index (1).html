<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PopRaggio — Popolazione per raggio · Lazio ISTAT 2021</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0c0a;
  --surface: #13140f;
  --card: #1c1d16;
  --border: #2a2b22;
  --accent: #c8f050;
  --accent-dim: #8aad2a;
  --blue: #50c0f0;
  --text: #e2e3da;
  --muted: #686960;
  --r: 6px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 1000;
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.logo-accent { color: var(--accent); }
.logo-sub { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; font-weight: 400; }
.header-hint { font-size: 0.65rem; color: var(--muted); }

/* ── LAYOUT ── */
.main { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; cursor: crosshair !important; }

/* Leaflet overrides */
.leaflet-container { background: #1a1b14 !important; }
.leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
.leaflet-control-zoom a:hover { background: var(--card) !important; color: var(--accent) !important; }
.leaflet-control-attribution { background: rgba(13,14,10,0.8) !important; color: var(--muted) !important; font-size: 0.55rem !important; }
.leaflet-control-attribution a { color: var(--muted) !important; }

/* ── PANEL ── */
.panel {
  width: 290px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px;
  gap: 16px;
}
.section-label {
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* ── RADIUS BUTTONS ── */
.radius-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.r-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  padding: 9px 4px;
  cursor: pointer;
  border-radius: var(--r);
  transition: all 0.12s;
  text-align: center;
}
.r-btn:hover { border-color: var(--blue); color: var(--blue); }
.r-btn.active { background: var(--blue); color: #0b0c0a; border-color: var(--blue); font-weight: 500; }

/* ── SLIDER ── */
.slider-row { display: flex; justify-content: space-between; font-size: 0.62rem; color: var(--muted); margin-bottom: 6px; }
.slider-row span { color: var(--blue); font-size: 0.72rem; }
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 2px;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--blue); cursor: pointer;
  border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--blue);
}

/* ── COORDINATE BOX ── */
.coord-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
  font-size: 0.63rem;
  color: var(--muted);
  line-height: 1.8;
}
.coord-val { color: var(--text); }
.coord-hint { font-size: 0.6rem; color: var(--muted); margin-top: 4px; font-style: italic; }

/* ── RESULT ── */
.result-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.result-pop {
  font-family: 'Fraunces', serif;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin: 4px 0;
}
.result-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.result-meta { font-size: 0.65rem; color: var(--muted); margin-top: 6px; }
.result-meta span { color: var(--text); }

.result-breakdown {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.65rem;
  padding: 6px 10px;
  background: var(--surface);
  border-radius: 4px;
  border-left: 2px solid var(--accent);
}
.breakdown-row .bval { color: var(--accent); font-size: 0.78rem; font-weight: 500; }
.breakdown-row .bname { color: var(--muted); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Loading */
.loading {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.68rem; color: var(--muted); padding: 8px 0;
}
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty { font-size: 0.7rem; color: var(--muted); text-align: center; padding: 20px 10px; line-height: 1.6; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 0 -16px; }

/* Source badge */
.source-badge {
  font-size: 0.58rem; color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 8px;
  display: inline-block;
  margin-top: 4px;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    Pop<span class="logo-accent">Raggio</span>
    <span class="logo-sub">Lazio · ISTAT 2021</span>
  </div>
  <div class="header-hint">Clicca sulla mappa per selezionare un punto</div>
</header>

<div class="main">
  <div id="map"></div>

  <div class="panel">

    <!-- RAGGIO -->
    <div>
      <div class="section-label">Raggio di analisi</div>
      <div class="radius-grid">
        <button class="r-btn" data-km="0.5">500m</button>
        <button class="r-btn active" data-km="1">1 km</button>
        <button class="r-btn" data-km="2">2 km</button>
        <button class="r-btn" data-km="3">3 km</button>
        <button class="r-btn" data-km="4">4 km</button>
        <button class="r-btn" data-km="5">5 km</button>
        <button class="r-btn" data-km="custom" id="custom-btn">—</button>
      </div>
      <div style="margin-top:10px;">
        <div class="slider-row">
          <span>Raggio personalizzato</span>
          <span id="slider-val">1.0 km</span>
        </div>
        <input type="range" id="radius-slider" min="0.1" max="5" step="0.1" value="1">
      </div>
    </div>

    <div class="divider"></div>

    <!-- PUNTO SELEZIONATO -->
    <div>
      <div class="section-label">Punto selezionato</div>
      <div class="coord-box" id="coord-box">
        <div class="coord-hint">↖ Clicca sulla mappa per posizionare il punto</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- RISULTATO -->
    <div>
      <div class="section-label">Popolazione nel raggio</div>
      <div id="result-area">
        <div class="empty">Seleziona un punto sulla mappa per calcolare la popolazione residente.</div>
      </div>
    </div>

  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const BASE_URL = 'https://zaccagninistefano1994-droid.github.io/popraggio/';
let index = null;
let selectedPoint = null;
let currentRadius = 1; // km
let circleLayer = null;
let markerLayer = null;
let sectionLayers = [];
let map;

// ── MAPPA ────────────────────────────────────────────────────────
map = L.map('map', { center: [41.9, 12.5], zoom: 9, zoomControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── LOAD INDEX ──────────────────────────────────────────────────
async function loadIndex() {
  try {
    const r = await fetch(BASE_URL + 'index.json');
    index = await r.json();
    console.log(`Index caricato: ${Object.keys(index).length} comuni`);
  } catch(e) {
    console.error('Errore caricamento index:', e);
  }
}
loadIndex();

// ── UTILITY ─────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function pointInPolygon(px, py, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function polygonCentroid(ring) {
  let cx = 0, cy = 0;
  ring.forEach(p => { cx += p[0]; cy += p[1]; });
  return [cx / ring.length, cy / ring.length];
}

function polygonArea(ring) {
  let area = 0;
  for (let i = 0; i < ring.length; i++) {
    const j = (i + 1) % ring.length;
    area += ring[i][0] * ring[j][1] - ring[j][0] * ring[i][1];
  }
  return Math.abs(area) / 2;
}

// Stima intersezione poligono/cerchio per proporzione area
function estimateIntersectionRatio(ring, clng, clat, radiusKm) {
  // Conta punti del poligono dentro il cerchio
  const pts = ring;
  const inside = pts.filter(p => haversine(clat, clng, p[1], p[0]) <= radiusKm).length;
  const ratio = inside / pts.length;

  // Se tutti i punti sono dentro -> 100% del poligono
  if (ratio === 1) return 1;
  // Se nessun punto -> controlla se il centroide è dentro (poligono piccolo dentro cerchio)
  if (ratio === 0) {
    const c = polygonCentroid(pts);
    if (haversine(clat, clng, c[1], c[0]) <= radiusKm) return 1;
    return 0;
  }
  // Altrimenti proporzione lineare
  return ratio;
}

// Bounding box del cerchio in gradi (approssimazione)
function circleBbox(lat, lng, radiusKm) {
  const dLat = radiusKm / 111.0;
  const dLng = radiusKm / (111.0 * Math.cos(lat * Math.PI / 180));
  return [lng - dLng, lat - dLat, lng + dLng, lat + dLat];
}

function bboxOverlap(a, b) {
  return a[0] <= b[2] && a[2] >= b[0] && a[1] <= b[3] && a[3] >= b[1];
}

// ── CALCOLO PRINCIPALE ──────────────────────────────────────────
async function calcola(lat, lng, radiusKm) {
  if (!index) { showError('Indice non ancora caricato, riprova.'); return; }

  showLoading();
  clearLayers();

  const circleBB = circleBbox(lat, lng, radiusKm);
  const comuniDaQuery = Object.entries(index).filter(([code, data]) => {
    return bboxOverlap(circleBB, data.bbox);
  });

  if (comuniDaQuery.length === 0) {
    showError('Nessun comune del Lazio nel raggio selezionato.');
    return;
  }

  let totalPop = 0;
  let comuniResult = [];

  // Disegna cerchio sulla mappa
  circleLayer = L.circle([lat, lng], {
    radius: radiusKm * 1000,
    color: '#50c0f0',
    weight: 2,
    fillColor: '#50c0f0',
    fillOpacity: 0.06,
    dashArray: '6 4'
  }).addTo(map);

  // Per ogni comune nel bounding box, carica i dati e calcola
  for (const [code, data] of comuniDaQuery) {
    try {
      let popComune = 0;

      if (data.t === 'centroid') {
        // Roma: usa centroidi
        const resp = await fetch(`${BASE_URL}${code}.json`);
        const entries = await resp.json(); // [[lng, lat, pop, area], ...]
        for (const [elng, elat, pop, area] of entries) {
          const dist = haversine(lat, lng, elat, elng);
          if (dist <= radiusKm) popComune += pop;
        }
      } else {
        // Comuni con poligoni
        const resp = await fetch(`${BASE_URL}${code}.geojson`);
        const fc = await resp.json();

        for (const feature of fc.features) {
          const geom = feature.geometry;
          const pop = feature.properties.p;
          if (!pop || pop === 0) continue;

          let rings = [];
          if (geom.type === 'Polygon') rings = [geom.coordinates[0]];
          else if (geom.type === 'MultiPolygon') rings = geom.coordinates.map(p => p[0]);

          for (const ring of rings) {
            if (ring.length < 3) continue;
            const ratio = estimateIntersectionRatio(ring, lng, lat, radiusKm);
            if (ratio > 0) popComune += Math.round(pop * ratio);
          }
        }
      }

      if (popComune > 0) {
        comuniResult.push({ name: data.name, pop: popComune, code });
        totalPop += popComune;
      }
    } catch(e) {
      console.warn(`Errore caricamento ${code}:`, e);
    }
  }

  comuniResult.sort((a, b) => b.pop - a.pop);
  showResult(totalPop, radiusKm, comuniResult, lat, lng);
}

// ── UI ──────────────────────────────────────────────────────────
function clearLayers() {
  if (circleLayer) { map.removeLayer(circleLayer); circleLayer = null; }
  sectionLayers.forEach(l => map.removeLayer(l));
  sectionLayers = [];
}

function showLoading() {
  document.getElementById('result-area').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <span>Calcolo in corso...</span>
    </div>`;
}

function showError(msg) {
  document.getElementById('result-area').innerHTML = `<div class="empty">${msg}</div>`;
}

function formatNum(n) {
  return n.toLocaleString('it-IT');
}

function showResult(totalPop, radiusKm, comuni, lat, lng) {
  const topComuni = comuni.slice(0, 6);
  const breakdown = topComuni.map(c => `
    <div class="breakdown-row">
      <span class="bname">${c.name}</span>
      <span class="bval">${formatNum(c.pop)}</span>
    </div>`).join('');

  const altri = comuni.slice(6);
  const altriPop = altri.reduce((s, c) => s + c.pop, 0);
  const altriRow = altri.length > 0 ? `
    <div class="breakdown-row">
      <span class="bname">Altri ${altri.length} comuni</span>
      <span class="bval">${formatNum(altriPop)}</span>
    </div>` : '';

  document.getElementById('result-area').innerHTML = `
    <div class="result-box">
      <div class="result-label">Popolazione stimata</div>
      <div class="result-pop">${formatNum(totalPop)}</div>
      <div class="result-meta">
        entro <span>${radiusKm} km</span> dal punto selezionato<br>
        su <span>${comuni.length}</span> comuni del Lazio
      </div>
      <div class="result-breakdown">
        ${breakdown}
        ${altriRow}
      </div>
      <div style="margin-top:10px;">
        <span class="source-badge">ISTAT Censimento 2021</span>
      </div>
    </div>`;
}

function updateCoordBox(lat, lng) {
  document.getElementById('coord-box').innerHTML = `
    <div>Lat <span class="coord-val">${lat.toFixed(5)}</span></div>
    <div>Lng <span class="coord-val">${lng.toFixed(5)}</span></div>`;
}

// ── EVENTS ──────────────────────────────────────────────────────
map.on('click', function(e) {
  const { lat, lng } = e.latlng;
  selectedPoint = { lat, lng };

  // Aggiorna marker
  if (markerLayer) map.removeLayer(markerLayer);
  markerLayer = L.circleMarker([lat, lng], {
    radius: 6, color: '#c8f050', weight: 2,
    fillColor: '#c8f050', fillOpacity: 1
  }).addTo(map);

  updateCoordBox(lat, lng);
  calcola(lat, lng, currentRadius);
});

// Bottoni raggio preset
document.querySelectorAll('.r-btn[data-km]').forEach(btn => {
  if (btn.dataset.km === 'custom') return;
  btn.addEventListener('click', function() {
    document.querySelectorAll('.r-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentRadius = parseFloat(this.dataset.km);
    document.getElementById('radius-slider').value = currentRadius;
    document.getElementById('slider-val').textContent = currentRadius + '.0 km';
    if (selectedPoint) calcola(selectedPoint.lat, selectedPoint.lng, currentRadius);
  });
});

// Slider personalizzato
const slider = document.getElementById('radius-slider');
slider.addEventListener('input', function() {
  currentRadius = parseFloat(this.value);
  document.getElementById('slider-val').textContent = currentRadius.toFixed(1) + ' km';
  document.querySelectorAll('.r-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('custom-btn').classList.add('active');
  document.getElementById('custom-btn').textContent = currentRadius.toFixed(1);
  if (selectedPoint) calcola(selectedPoint.lat, selectedPoint.lng, currentRadius);
});
</script>
</body>
</html>
